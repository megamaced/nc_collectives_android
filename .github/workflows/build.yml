name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write   # needed for the release step on tag pushes

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Decode release keystore
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
            {
              echo "ANDROID_RELEASE_KEYSTORE_FILE=$RUNNER_TEMP/release.keystore"
              echo "ANDROID_RELEASE_STORE_PASSWORD=$STORE_PASSWORD"
              echo "ANDROID_RELEASE_KEY_ALIAS=$KEY_ALIAS"
              echo "ANDROID_RELEASE_KEY_PASSWORD=$KEY_PASSWORD"
            } >> "$GITHUB_ENV"
          else
            echo "::warning::ANDROID_RELEASE_KEYSTORE_BASE64 secret not set — release APK will be unsigned"
          fi

      - name: Build
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            ./gradlew --no-daemon ktlintCheck lintDebug testDebugUnitTest assembleDebug assembleRelease
          else
            ./gradlew --no-daemon ktlintCheck lintDebug testDebugUnitTest assembleDebug
          fi

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: nc_collectives_android-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload release APK
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: nc_collectives_android-release-${{ github.sha }}
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Attach release APK to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
